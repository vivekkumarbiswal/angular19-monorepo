<h2>Get API Page</h2>
<div class="row">
  <div class="col-3">
    <button class="btn btn-primary" (click)="getUser()">Load User</button>
    <button class="btn btn-primary" (click)="getProduct()">Load Product</button>
  </div>
</div>
<div class="row">
  <div class="col-6">
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Sr. No</th>
          <th>Name</th>
          <th>User Name</th>
          <th>Email</th>
          <th>Phone No.</th>
          <th>Website</th>
        </tr>
      </thead>
      <tbody *ngFor="let item of userList; let i = index">
        <tr>
          <td>{{ i + 1 }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.username }}</td>
          <td>{{ item.email }}</td>
          <td>{{ item.phone }}</td>
          <td>{{ item.website }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="col-5">
    <select>
      <option
        *ngFor="let item of productList; let i = index"
        [value]="item.product_id"
      >
        {{ item.name }}
      </option>
    </select>
  </div>
</div>

<ul>
  <li *ngFor="let item of anotherProductList">
    {{ item.title }} - {{ item.category }}
  </li>
</ul>

<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Category</th>
    </tr>
    <tr *ngFor="let item of anotherProductList">
      <td>{{ item.title }}</td>
      <td>{{ item.category }}</td>
    </tr>
  </thead>
</table>
