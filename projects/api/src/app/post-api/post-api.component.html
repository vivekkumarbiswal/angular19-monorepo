<div class="container mt-4">
  <!-- Button -->
  <button class="btn btn-success mb-3" (click)="getAllCars()">Load Cars</button>

  <!-- Table -->
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>#</th>
        <th>Brand</th>
        <th>Model</th>
        <th>Registration No</th>
        <th>Daily Rate</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of carList; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ item.brand }}</td>
        <td>{{ item.model }}</td>
        <td>{{ item.regNo }}</td>
        <td>{{ item.dailyRate }}</td>
      </tr>
    </tbody>
  </table>

  <!-- Form -->
  <div class="card p-3 mt-4">
    <h4>Create New Car</h4>

    <div class="row">
      <div class="col-md-6 mb-2">
        <label>Registration No</label>
        <input type="text" class="form-control" />
      </div>

      <div class="col-md-6 mb-2">
        <label>Brand</label>
        <input type="text" class="form-control" />
      </div>

      <div class="col-md-6 mb-2">
        <label>Model</label>
        <input type="text" class="form-control" />
      </div>

      <div class="col-md-6 mb-2">
        <label>Year</label>
        <input type="number" class="form-control" />
      </div>

      <div class="col-md-6 mb-2">
        <label>Color</label>
        <input type="text" class="form-control" />
      </div>

      <div class="col-md-6 mb-2">
        <label>Daily Rate</label>
        <input type="number" class="form-control" />
      </div>

      <div class="col-md-12 mb-2">
        <label>Car Image URL</label>
        <input type="text" class="form-control" />
      </div>
    </div>

    <button class="btn btn-primary mt-3">Save Car</button>
  </div>
</div>
